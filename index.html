<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #dfe9f3, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            width: 300px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        .calculator-card{
            background: #ffffff;
            padding: 25px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 120px;
            text-align: center;

        }

        input, select, button{
            width: 100px;
            padding: 10px;
            margin: 10px;
            border: 1px solid;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button{
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover{
            background-color: #0056b3;

        }

        .result-box{
            margin-top: 15px;
            font-size: 10px;
            font-weight: bold;
        }



















        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            font-weight: bold;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        input:focus, select:focus {
            border-color: #007bff;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border: none;
            border-radius: 6px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            background-color: #f1f8ff;
            font-weight: bold;
            color: #000;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #555;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculator</h2>

    <label>First Number</label>
    <input type="number" id="num1" placeholder="Enter first number">

    <label>Second Number</label>
    <input type="number" id="num2" placeholder="Enter second number">

    <label>Select Operation</label>
    <select id="operation">
        <option value="+">Addition (+)</option>
        <option value="-">Subtraction (-)</option>
        <option value="*">Multiplication (*)</option>
        <option value="/">Division (/)</option>
    </select>

    <button onclick="calculate()">Calculate</button>

    <label>Result</label>
    <input type="text" id="result" placeholder="Result" readonly>

    <div class="footer">
        <strong>Submitted by:</strong> Harsh Vijay Shrivas <br>
        <strong>PRN:</strong> 1272250571
    </div>
</div>

<script>
    function calculate() {
        let n1 = parseFloat(document.getElementById("num1").value);
        let n2 = parseFloat(document.getElementById("num2").value);
        let op = document.getElementById("operation").value;
        let result;

        if (isNaN(n1) || isNaN(n2)) {
            result = "Enter valid numbers";
        } else {
            switch(op) {
                case '+':
                    result = n1 + n2;
                    break;
                case '-':
                    result = n1 - n2;
                    break;
                case '*':
                    result = n1 * n2;
                    break;
                case '/':
                    result = (n2 === 0) ? "Cannot divide by 0" : n1 / n2;
                    break;
            }
        }

        document.getElementById("result").value = result;
    }
</script>

</body>
</html>

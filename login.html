<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f5;
        }

        .login-box {
            width: 350px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 12px #bbb;
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 11px;
            cursor: pointer;
        }

        #message {
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>Login</h2>

    <form action="authenticate.jsp"
          method="post"
          onsubmit="return validateLogin()">

        <label>Username</label>
        <input type="text"
               id="username"
               name="username"
               required>

        <label>Password</label>
        <input type="password"
               id="password"
               name="password"
               minlength="4"
               required>

        <button type="submit">Login</button>

        <p id="message"></p>

    </form>

</div>

<script>
    function validateLogin() {
        const username =
            document.getElementById("username").value.trim();

        const password =
            document.getElementById("password").value.trim();

        const message =
            document.getElementById("message");

        if (username.length < 3) {
            message.textContent =
                "Username must contain at least 3 characters.";
            return false;
        }

        if (password.length < 4) {
            message.textContent =
                "Password must contain at least 4 characters.";
            return false;
        }

        return true;
    }
</script>

</body>
</html>

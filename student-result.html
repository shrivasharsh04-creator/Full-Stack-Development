<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .container {
            width: 500px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px #ccc;
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 9px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        button {
            margin-top: 18px;
            padding: 10px 20px;
        }

        table {
            width: 100%;
            margin-top: 25px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #999;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Online Student Result System</h2>

    <form id="resultForm">

        <label>Student Name</label>
        <input type="text" id="studentName" required>

        <label>Java Marks</label>
        <input type="number"
               id="javaMarks"
               min="0"
               max="100"
               required>

        <label>JSP Marks</label>
        <input type="number"
               id="jspMarks"
               min="0"
               max="100"
               required>

        <label>Database Marks</label>
        <input type="number"
               id="databaseMarks"
               min="0"
               max="100"
               required>

        <label>Networking Marks</label>
        <input type="number"
               id="networkMarks"
               min="0"
               max="100"
               required>

        <button type="button" onclick="calculateResult()">
            Calculate Result
        </button>

        <button type="reset" onclick="clearResult()">
            Clear
        </button>

    </form>

    <table id="resultTable" style="display:none;">

        <tr>
            <th>Student Name</th>
            <td id="outputName"></td>
        </tr>

        <tr>
            <th>Total Marks</th>
            <td id="outputTotal"></td>
        </tr>

        <tr>
            <th>Percentage</th>
            <td id="outputPercentage"></td>
        </tr>

        <tr>
            <th>Grade</th>
            <td id="outputGrade"></td>
        </tr>

        <tr>
            <th>Result</th>
            <td id="outputResult"></td>
        </tr>

    </table>

</div>

<script>
    function calculateResult() {

        const name =
            document.getElementById("studentName").value.trim();

        const javaMarks =
            Number(document.getElementById("javaMarks").value);

        const jspMarks =
            Number(document.getElementById("jspMarks").value);

        const databaseMarks =
            Number(document.getElementById("databaseMarks").value);

        const networkMarks =
            Number(document.getElementById("networkMarks").value);

        if (!name ||
            javaMarks < 0 || javaMarks > 100 ||
            jspMarks < 0 || jspMarks > 100 ||
            databaseMarks < 0 || databaseMarks > 100 ||
            networkMarks < 0 || networkMarks > 100) {

            alert("Please enter valid details and marks.");
            return;
        }

        const total =
            javaMarks +
            jspMarks +
            databaseMarks +
            networkMarks;

        const percentage = total / 4;

        let grade;
        let result;

        if (javaMarks < 35 ||
            jspMarks < 35 ||
            databaseMarks < 35 ||
            networkMarks < 35) {

            grade = "F";
            result = "Fail";

        } else {

            result = "Pass";

            if (percentage >= 90) {
                grade = "A+";
            } else if (percentage >= 80) {
                grade = "A";
            } else if (percentage >= 70) {
                grade = "B";
            } else if (percentage >= 60) {
                grade = "C";
            } else if (percentage >= 50) {
                grade = "D";
            } else {
                grade = "E";
            }
        }

        document.getElementById("outputName").textContent = name;

        document.getElementById("outputTotal").textContent =
            total + " / 400";

        document.getElementById("outputPercentage").textContent =
            percentage.toFixed(2) + "%";

        document.getElementById("outputGrade").textContent = grade;

        document.getElementById("outputResult").textContent = result;

        document.getElementById("resultTable").style.display =
            "table";
    }

    function clearResult() {
        document.getElementById("resultTable").style.display =
            "none";
    }
</script>

</body>
</html>
